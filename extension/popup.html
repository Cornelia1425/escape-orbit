<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Escape Orbit Focus</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <h1>Escape Orbit</h1>
      <p class="subtitle">Instagram focus block</p>

      <label class="toggle-row">
        <span>Block Instagram</span>
        <input type="checkbox" id="focusToggle" />
        <span class="switch" aria-hidden="true"></span>
      </label>

      <p id="status" class="status">Loading…</p>

      <button type="button" id="resetRules" class="reset-button">Reset Focus Guard</button>

      <p class="hint">
        Auto-enables when you launch a mission in Escape Orbit at
        <code>localhost:5174</code>. Manual toggle still works.
      </p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
